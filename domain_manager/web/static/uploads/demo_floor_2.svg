<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="680" viewBox="0 0 1000 680">
  <defs>
    <style>
      .wall { stroke: #555; stroke-width: 3; fill: #2a2d35; }
      .room-fill { fill: #252830; }
      .room-label { font-family: sans-serif; font-size: 13px; fill: #9da3ad; letter-spacing: 0.04em; text-transform: uppercase; }
      .room-sub { font-family: sans-serif; font-size: 11px; fill: #6b7280; }
      .door { stroke: #4a9eff; stroke-width: 2; fill: none; stroke-dasharray: 4 2; }
      .corridor { fill: #1e2128; }
      .window { stroke: #4a9eff; stroke-width: 2; fill: rgba(74,158,255,0.08); }
    </style>
  </defs>
  <rect width="1000" height="680" fill="#1a1d23"/>
  <rect x="30" y="30" width="940" height="620" class="wall" rx="2"/>
  <rect x="30" y="290" width="940" height="100" class="corridor" stroke="#444" stroke-width="1"/>
  <text x="500" y="348" text-anchor="middle" class="room-label" font-size="11px">C H O D B A   2. P A T R O</text>

  <!-- Učebna B1 -->
  <rect x="30" y="30" width="460" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="260" y="150" text-anchor="middle" class="room-label">Učebna B1</text>
  <text x="260" y="170" text-anchor="middle" class="room-sub">Jazyková učebna</text>
  <rect x="50" y="30" width="60" height="8" class="window"/>
  <rect x="160" y="30" width="60" height="8" class="window"/>
  <rect x="280" y="30" width="60" height="8" class="window"/>
  <rect x="400" y="30" width="60" height="8" class="window"/>
  <path d="M 280 290 A 30 30 0 0 1 250 260" class="door"/>
  <line x1="280" y1="290" x2="280" y2="260" class="door"/>

  <!-- Učebna B2 (menší) -->
  <rect x="490" y="30" width="250" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="615" y="150" text-anchor="middle" class="room-label">Učebna B2</text>
  <text x="615" y="170" text-anchor="middle" class="room-sub">5 počítačů</text>
  <rect x="510" y="30" width="60" height="8" class="window"/>
  <rect x="620" y="30" width="60" height="8" class="window"/>
  <path d="M 600 290 A 30 30 0 0 1 570 260" class="door"/>
  <line x1="600" y1="290" x2="600" y2="260" class="door"/>

  <!-- Sborovna -->
  <rect x="740" y="30" width="230" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="855" y="150" text-anchor="middle" class="room-label">Sborovna</text>
  <rect x="760" y="30" width="60" height="8" class="window"/>
  <rect x="870" y="30" width="60" height="8" class="window"/>
  <rect x="962" y="60" width="8" height="60" class="window"/>
  <path d="M 840 290 A 30 30 0 0 0 870 260" class="door"/>
  <line x1="840" y1="290" x2="870" y2="290" class="door"/>

  <!-- Dole -->
  <rect x="30" y="390" width="300" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="180" y="510" text-anchor="middle" class="room-label">Archiv</text>
  <rect x="50" y="642" width="60" height="8" class="window"/>
  <rect x="160" y="642" width="60" height="8" class="window"/>

  <rect x="330" y="390" width="360" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="510" y="510" text-anchor="middle" class="room-label">Konferenční sál</text>
  <rect x="350" y="642" width="60" height="8" class="window"/>
  <rect x="480" y="642" width="60" height="8" class="window"/>
  <rect x="610" y="642" width="60" height="8" class="window"/>

  <rect x="690" y="390" width="280" height="260" class="room-fill" stroke="#444" stroke-width="1"/>
  <text x="830" y="510" text-anchor="middle" class="room-label">Učitelé</text>
  <text x="830" y="530" text-anchor="middle" class="room-sub">Kabinety 2A–2D</text>
  <rect x="710" y="642" width="60" height="8" class="window"/>
  <rect x="840" y="642" width="60" height="8" class="window"/>
  <rect x="962" y="420" width="8" height="60" class="window"/>
  <rect x="962" y="540" width="8" height="60" class="window"/>
</svg>
